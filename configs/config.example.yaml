# LLM-HPC 项目配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

# ============== LLM 配置 ==============
llm:
  provider: openai
  model: gpt-4o  # 可选: gpt-4o, gpt-4-turbo, gpt-3.5-turbo
  temperature: 0  # 0 = 确定性输出，便于复现
  max_tokens: 4096
  timeout: 120  # 秒

# ============== API Key ==============
# 建议使用环境变量: export OPENAI_API_KEY=your-key
api:
  openai_key: ${OPENAI_API_KEY}

# ============== 分析配置 ==============
analysis:
  prompt_types:
    - zero_shot
    - few_shot
    - contextual
  output_format: json
  
  evaluation:
    hotspot_weight: 40
    bottleneck_weight: 30
    gpu_weight: 20
    suggestions_weight: 10

# ============== 基准程序配置 ==============
benchmarks:
  minimd:
    name: miniMD
    # Windows 访问 WSL 路径格式: //wsl$/发行版名/home/用户名/...
    path: //wsl$/Ubuntu-24.04/home/yusei/hpc-project/miniMD/ref/force_lj.cpp
    description: Molecular Dynamics - Lennard-Jones Force Calculation
    ground_truth:
      hotspot: ForceLJ::compute
      time_percentage: 80.5
      bottleneck_type: compute
      gpu_suitable: true
    profiling_data:
      total_time: 4.212
      t_force: 3.393
      t_neigh: 0.671
      t_comm: 0.061
      t_other: 0.088
      
  hpcg:
    name: HPCG
    # Windows 访问 WSL 路径格式
    path: //wsl$/Ubuntu-24.04/home/yusei/hpc-project/hpcg/src/ComputeSPMV_ref.cpp
    description: Sparse Matrix-Vector Multiplication
    ground_truth:
      hotspot: SpMV inner loop
      time_percentage: 13.6
      bottleneck_type: memory
      gpu_suitable: true
    profiling_data:
      total_time: 64.89
      mg_time: 53.94
      spmv_time: 8.80
      ddot_time: 1.24
      waxpby_time: 0.91
      gflops: 1.95
      bandwidth_gbs: 15.01

# ============== GPU 转换配置 ==============
conversion:
  target_functions:
    minimd:
      - compute_fullneigh
      - compute_halfneigh
    hpcg:
      - ComputeSPMV_ref
  
  cuda:
    arch: sm_86  # RTX 3060
    optimization_level: 3
    fast_math: false

# ============== 输出配置 ==============
output:
  results_dir: results
  analysis_dir: results/analysis
  conversion_dir: results/conversion
  logs_dir: logs
  save_raw_response: true
  save_evaluation: true
  timestamp_format: "%Y%m%d_%H%M%S"

# ============== 日志配置 ==============
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/llm_hpc.log
